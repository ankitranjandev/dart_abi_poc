name: ABI Compatibility Check

on: [push, pull_request]

jobs:
  check-abi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y abigail-tools cmake build-essential

      - name: Download Dart Headers
        run: |
          mkdir -p dart_headers/internal
          # Fetch the official headers needed for compilation
          curl -L -o dart_headers/dart_api.h https://raw.githubusercontent.com/dart-lang/sdk/main/runtime/include/dart_api.h
          curl -L -o dart_headers/dart_api_dl.h https://raw.githubusercontent.com/dart-lang/sdk/main/runtime/include/dart_api_dl.h
          curl -L -o dart_headers/dart_api_dl.c https://raw.githubusercontent.com/dart-lang/sdk/main/runtime/include/dart_api_dl.c
          curl -L -o dart_headers/dart_native_api.h https://raw.githubusercontent.com/dart-lang/sdk/main/runtime/include/dart_native_api.h
          curl -L -o dart_headers/dart_tools_api.h https://raw.githubusercontent.com/dart-lang/sdk/main/runtime/include/dart_tools_api.h
          curl -L -o dart_headers/dart_version.h https://raw.githubusercontent.com/dart-lang/sdk/main/runtime/include/dart_version.h
          curl -L -o dart_headers/internal/dart_api_dl_impl.h https://raw.githubusercontent.com/dart-lang/sdk/main/runtime/include/internal/dart_api_dl_impl.h

      - name: Build Current Code
        run: |
          mkdir build && cd build
          cmake ..
          make

      - name: Checkout Base Branch (For Comparison)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base_code

      - name: Build Base Code
        if: github.event_name == 'pull_request'
        run: |
          mkdir base_build && cd base_build
          cmake ../base_code
          make

      - name: Run abidiff
        if: github.event_name == 'pull_request'
        run: |
          abidiff --suppr dart_ext.abignore base_build/libdart_abi_extension.so build/libdart_abi_extension.so
